<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Levelink — Cinématic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#fff;gap:16px;padding:20px}
canvas{display:block;max-width:100%;border:1px solid #111}
#wrap{width:390px;max-width:100%}
#bar-bg{height:3px;background:#111;border-radius:2px;overflow:hidden;margin-top:8px}
#bar{height:100%;background:linear-gradient(90deg,#2979ff,#29b6f6);width:0%}
#status{font-size:11px;color:#333;margin-top:6px;letter-spacing:1px}
#dl{display:none;margin-top:10px;padding:10px 24px;background:linear-gradient(135deg,#2979ff,#29b6f6);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:8px;font-family:inherit}
</style>
</head>
<body>
<canvas id="c" width="390" height="844"></canvas>
<div id="wrap">
  <div id="bar-bg"><div id="bar"></div></div>
  <div id="status">INITIALISATION...</div>
</div>
<button id="dl" onclick="dl()">TÉLÉCHARGER</button>

<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const W=390,H=844,FPS=30,DUR=55;
const TF=FPS*DUR;

// ── Easing ──
const eOut=t=>1-Math.pow(1-t,3);
const eOut5=t=>1-Math.pow(1-t,5);
const eIn=t=>t*t*t;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function ft(s){return s*FPS} // frame from seconds
function pct(s,e,f){return clamp((f-ft(s))/(ft(e)-ft(s)),0,1)} // progress

// ── Palette ──
const B='#2979ff',C='#29b6f6',W2='rgba(255,255,255,',D='#04080f';
function hA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}

// ── Particules étoiles ──
const stars=Array.from({length:180},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.2+0.1,
  a:Math.random()*0.5+0.05,
  ph:Math.random()*Math.PI*2,
  spd:Math.random()*0.02+0.003
}));

function drawStars(alpha,f){
  stars.forEach(s=>{
    const tw=s.a*(0.5+0.5*Math.sin(f*s.spd+s.ph))*alpha;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,220,255,${tw})`;ctx.fill();
  });
}

// ── Fond nebula ──
function drawNebula(cx,cy,r,col,a){
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,hA(col,a));
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
}

// ── Lignes de scan cinéma ──
function drawLetterbox(a){
  // Barres noires haut/bas style cinéma
  const bh=60;
  ctx.fillStyle=`rgba(0,0,0,${a})`;
  ctx.fillRect(0,0,W,bh);
  ctx.fillRect(0,H-bh,W,bh);
}

// ── Texte avec reveal lettre par lettre ──
function drawRevealText(text,x,y,size,col,progress,align='center'){
  const chars=Math.floor(text.length*progress);
  const partial=text.slice(0,chars);
  ctx.font=`900 ${size}px Orbitron, monospace`;
  ctx.fillStyle=col;
  ctx.textAlign=align;
  ctx.textBaseline='middle';
  ctx.fillText(partial,x,y);
  // Curseur clignotant
  if(chars<text.length && Math.sin(Date.now()*0.01)>0){
    const mw=ctx.measureText(partial).width;
    const ox=align==='center'?x-(ctx.measureText(text).width/2)+mw:x+mw;
    ctx.fillStyle=C;
    ctx.fillRect(ox+2,y-size*0.4,2,size*0.8);
  }
}

// ── Mot par mot ──
function drawWordByWord(words,x,y,size,col,lineH,progress){
  // progress 0..1 = fraction des mots visibles
  const vis=Math.floor(words.length*eOut5(progress));
  words.slice(0,vis).forEach((w,i)=>{
    const wAlpha=eOut(clamp((progress*words.length-i)*2,0,1));
    ctx.save();
    ctx.globalAlpha=wAlpha;
    ctx.font=`900 ${size}px Orbitron, monospace`;
    ctx.fillStyle=w.col||col;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(w.t,x,y+i*lineH);
    ctx.restore();
  });
}

// ── Flash de coupe ──
function drawCut(t){
  // t=0: flash blanc, t=1: transparent
  const a=Math.max(0,1-t*8);
  if(a>0){
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ══════════════════════════════════════════
// SÉQUENCE — 55 secondes
// 
// 0–5s   : Noir total → particules apparaissent → "IL ÉTAIT UNE FOIS..."
// 5–11s  : "UN GARÇON DE 17 ANS" → fondu → "QUI VOULAIT CHANGER"
// 11–17s : "SA VIE" — texte énorme, centré, glow
// 17–23s : Statistiques type "interview" — chiffres qui tombent
// 23–30s : "ALORS IL A CONSTRUIT" → logo hex apparaît
// 30–38s : Interface Levelink révélée — cards, XP, rang
// 38–45s : "MAINTENANT C'EST TON TOUR"
// 45–55s : Logo + CTA final
// ══════════════════════════════════════════

function renderFrame(f){
  const sec=f/FPS;
  ctx.clearRect(0,0,W,H);

  // ── BG GLOBAL ──
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Nebula permanente (fade in après 1s)
  const nbA=eOut(pct(1,4,f));
  drawNebula(W/2,H*0.35,320,B,0.1*nbA);
  drawNebula(W*0.7,H*0.6,200,C,0.07*nbA);

  // Stars
  drawStars(eOut(pct(0.5,3,f)),f);

  // ══════════════════════════════════════
  // SCÈNE 1 : 0–5s — OUVERTURE
  // ══════════════════════════════════════
  if(sec<5){
    // "IL ÉTAIT UNE FOIS..." — apparaît lettre par lettre
    const t1=pct(1.5,4,f);
    if(t1>0){
      ctx.save();
      ctx.globalAlpha=t1;
      ctx.font='400 13px Rajdhani, sans-serif';
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.letterSpacing='4px';
      ctx.fillText('— UNE HISTOIRE VRAIE —',W/2,H/2);
      ctx.restore();
    }
    // Fade in de la ligne
    const lineA=eOut(pct(2,3.5,f));
    if(lineA>0){
      ctx.save();ctx.globalAlpha=lineA*0.25;
      ctx.strokeStyle=C;ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(W*0.2,H/2+28);ctx.lineTo(W*0.8,H/2+28);ctx.stroke();
      ctx.restore();
    }
  }

  // ══════════════════════════════════════
  // SCÈNE 2 : 5–11s — "UN GARÇON DE 17 ANS"
  // ══════════════════════════════════════
  if(sec>=5 && sec<11){
    const t=pct(5,11,f);
    // Flash de coupe au début
    drawCut(pct(5,5.25,f));

    // Ligne 1 : "UN GARÇON"
    const t1=eOut(pct(5.3,7,f));
    const fade1=sec>8.5?1-eOut(pct(8.5,9.5,f)):1;
    if(t1>0){
      ctx.save();ctx.globalAlpha=t1*fade1;
      ctx.font='400 16px Rajdhani, sans-serif';
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='6px';
      ctx.fillText('UN GARÇON',W/2,H/2-60);
      ctx.restore();
    }
    // Ligne 2 : "17 ANS" — énorme
    const t2=eOut(pct(6,7.5,f));
    const fade2=sec>8.5?1-eOut(pct(8.5,9.5,f)):1;
    if(t2>0){
      ctx.save();ctx.globalAlpha=t2*fade2;
      ctx.shadowBlur=20;ctx.shadowColor=B;
      ctx.font='900 72px Orbitron, monospace';
      ctx.fillStyle='#ffffff';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('17 ANS',W/2,H/2+10);
      ctx.restore();
    }
    // Ligne 3 : sous-titre
    const t3=eOut(pct(7,8.5,f));
    const fade3=sec>8.5?1-eOut(pct(8.5,9.5,f)):1;
    if(t3>0){
      ctx.save();ctx.globalAlpha=t3*0.5*fade3;
      ctx.font='600 11px Rajdhani, sans-serif';
      ctx.fillStyle=C;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='3px';
      ctx.fillText('sans expérience — sans argent',W/2,H/2+75);
      ctx.restore();
    }
  }

  // ══════════════════════════════════════
  // SCÈNE 3 : 11–17s — "QUI VOULAIT CHANGER SA VIE"
  // ══════════════════════════════════════
  if(sec>=11 && sec<17){
    drawCut(pct(11,11.2,f));
    const t=pct(11,17,f);

    // "QUI VOULAIT"
    const a1=eOut(pct(11.3,12.5,f))*(1-eOut(pct(15.5,16.5,f)));
    if(a1>0){
      ctx.save();ctx.globalAlpha=a1;
      ctx.font='600 18px Rajdhani, sans-serif';
      ctx.fillStyle='rgba(255,255,255,.35)';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='5px';
      ctx.fillText('QUI VOULAIT',W/2,H/2-100);
      ctx.restore();
    }
    // "CHANGER"
    const a2=eOut(pct(12,13.5,f))*(1-eOut(pct(15.5,16.5,f)));
    if(a2>0){
      ctx.save();ctx.globalAlpha=a2;
      ctx.font='900 54px Orbitron, monospace';
      ctx.fillStyle='#fff';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('CHANGER',W/2,H/2-28);
      ctx.restore();
    }
    // "SA VIE" — avec glow bleu intense
    const a3=eOut(pct(13,14.5,f))*(1-eOut(pct(15.5,16.5,f)));
    if(a3>0){
      ctx.save();ctx.globalAlpha=a3;
      ctx.shadowBlur=0;
      // Gradient text via fill
      const g=ctx.createLinearGradient(W/2-100,0,W/2+100,0);
      g.addColorStop(0,B);g.addColorStop(1,C);
      ctx.fillStyle=g;
      ctx.font='900 72px Orbitron, monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('SA VIE',W/2,H/2+60);
      ctx.restore();
    }
    // Point sous-textuel
    const a4=eOut(pct(14.5,15.5,f))*(1-eOut(pct(15.5,16.5,f)));
    if(a4>0){
      ctx.save();ctx.globalAlpha=a4*0.4;
      ctx.font='500 10px Rajdhani, sans-serif';
      ctx.fillStyle=C;ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='4px';
      ctx.fillText('comme tout le monde voudrait le faire',W/2,H/2+130);
      ctx.restore();
    }
  }

  // ══════════════════════════════════════
  // SCÈNE 4 : 17–23s — CHIFFRES INTERVIEW
  // ══════════════════════════════════════
  if(sec>=17 && sec<23){
    drawCut(pct(17,17.2,f));

    // Fond légèrement différent
    drawNebula(W/2,H*0.5,280,B,0.08);

    const lines=[
      {s:17.4,e:18.8,num:'0€',desc:'de budget',dy:-130},
      {s:18.6,e:20,num:'2',desc:'personnes',dy:-30},
      {s:20,e:21.4,num:'100%',desc:'passion',dy:70},
      {s:21.2,e:22.8,num:'∞',desc:'ambition',dy:170},
    ];
    lines.forEach(l=>{
      const a=eOut(pct(l.s,l.s+0.8,f))*(1-eOut(pct(22,22.8,f)));
      if(a<=0)return;
      ctx.save();ctx.globalAlpha=a;
      // Nombre
      ctx.font='900 48px Orbitron, monospace';
      ctx.fillStyle=C;
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(l.num,56,H/2+l.dy);
      // Desc
      ctx.font='600 14px Rajdhani, sans-serif';
      ctx.fillStyle='rgba(255,255,255,.35)';
      ctx.letterSpacing='2px';
      const numW=ctx.measureText(l.num).width+8;
      ctx.font='900 48px Orbitron, monospace';
      const nw=ctx.measureText(l.num).width;
      ctx.font='600 13px Rajdhani, sans-serif';
      ctx.fillText(l.desc,56+nw+14,H/2+l.dy+4);
      // Ligne sous
      ctx.strokeStyle=hA(B,0.2);ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(48,H/2+l.dy+32);ctx.lineTo(W-48,H/2+l.dy+32);ctx.stroke();
      ctx.restore();
    });
  }

  // ══════════════════════════════════════
  // SCÈNE 5 : 23–30s — "ALORS IL A CONSTRUIT"
  // ══════════════════════════════════════
  if(sec>=23 && sec<30){
    drawCut(pct(23,23.2,f));

    // "ALORS"
    const a1=eOut(pct(23.4,24.5,f))*(1-eOut(pct(28.5,29.5,f)));
    if(a1>0){
      ctx.save();ctx.globalAlpha=a1*0.4;
      ctx.font='600 14px Rajdhani, sans-serif';
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='6px';
      ctx.fillText('ALORS',W/2,H*0.28);
      ctx.restore();
    }
    // "IL A CONSTRUIT"
    const a2=eOut(pct(24,25.5,f))*(1-eOut(pct(28.5,29.5,f)));
    if(a2>0){
      ctx.save();ctx.globalAlpha=a2;
      ctx.font='900 36px Orbitron, monospace';
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('IL A CONSTRUIT',W/2,H*0.38);
      ctx.restore();
    }
    // Logo hexagonal qui apparaît
    const logoA=eOut(pct(25.5,27,f))*(1-eOut(pct(28.5,29.5,f)));
    if(logoA>0){
      const cx=W/2, cy=H*0.57, R=60*logoA;
      ctx.save();ctx.globalAlpha=logoA;
      ctx.shadowBlur=20*logoA;ctx.shadowColor=B;
      // Hex
      ctx.strokeStyle=B;ctx.lineWidth=2;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3-Math.PI/6;
        i?ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R):ctx.moveTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
      }
      ctx.closePath();ctx.stroke();
      // Inner hex
      ctx.strokeStyle=hA(C,0.3);ctx.lineWidth=1;ctx.setLineDash([3,4]);
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3-Math.PI/6;
        i?ctx.lineTo(cx+Math.cos(a)*R*0.55,cy+Math.sin(a)*R*0.55):ctx.moveTo(cx+Math.cos(a)*R*0.55,cy+Math.sin(a)*R*0.55);
      }
      ctx.closePath();ctx.stroke();ctx.setLineDash([]);
      // Nodes
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3-Math.PI/6;
        ctx.fillStyle=i%2?C:B;ctx.shadowBlur=6;ctx.shadowColor=i%2?C:B;
        ctx.beginPath();ctx.arc(cx+Math.cos(a)*R,cy+Math.sin(a)*R,3.5,0,Math.PI*2);ctx.fill();
      }
      // Center
      ctx.fillStyle='#fff';ctx.shadowBlur=12;ctx.shadowColor='#fff';
      ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    // LEVELINK sous le logo
    const wA=eOut(pct(27,28.5,f))*(1-eOut(pct(28.5,29.5,f)));
    if(wA>0){
      ctx.save();ctx.globalAlpha=wA;
      const g=ctx.createLinearGradient(W/2-80,0,W/2+80,0);
      g.addColorStop(0,'#fff');g.addColorStop(0.5,C);g.addColorStop(1,B);
      ctx.fillStyle=g;
      ctx.font='900 28px Orbitron, monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('LEVELINK',W/2,H*0.78);
      ctx.restore();
    }
  }

  // ══════════════════════════════════════
  // SCÈNE 6 : 30–38s — INTERFACE
  // ══════════════════════════════════════
  if(sec>=30 && sec<38){
    drawCut(pct(30,30.2,f));

    const t=pct(30,38,f);
    drawNebula(W/2,H*0.4,300,B,0.1);

    // Titre
    const ta=eOut(pct(30.3,31.5,f));
    if(ta>0){
      ctx.save();ctx.globalAlpha=ta*0.5;
      ctx.font='700 9px Orbitron, monospace';
      ctx.fillStyle=C;ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='4px';
      ctx.fillText('[ APERÇU DE L\'APPLICATION ]',W/2,H*0.15);
      ctx.restore();
    }

    // Cards d'interface
    function iCard(x,y,w,h,icon,name,sub,xpcol,delay){
      const a=eOut(pct(30.5+delay,31.5+delay,f));
      if(a<=0)return;
      ctx.save();ctx.globalAlpha=a;
      ctx.fillStyle='rgba(255,255,255,0.03)';
      rr(x,y,w,h,12);ctx.fill();
      ctx.strokeStyle=hA(B,0.15);ctx.lineWidth=1;
      rr(x,y,w,h,12);ctx.stroke();
      // Icon
      ctx.fillStyle=hA(xpcol,0.15);rr(x+12,y+h/2-18,36,36,9);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='15px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(icon,x+30,y+h/2);
      // Text
      ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='700 12px Orbitron,monospace';ctx.textAlign='left';
      ctx.fillText(name,x+56,y+h/2-8);
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='700 7px Orbitron,monospace';
      ctx.fillText(sub,x+56,y+h/2+9);
      ctx.fillStyle=xpcol;ctx.font='700 10px Orbitron,monospace';ctx.textAlign='right';
      ctx.shadowBlur=8;ctx.shadowColor=xpcol;ctx.fillText('+XP',x+w-12,y+h/2);
      ctx.restore();
    }

    iCard(22,H*0.22,346,58,'⚔','Méditation','SÉRIE · 5 MIN',C,0);
    iCard(22,H*0.37,346,58,'★','Sport','RANG B · 20 MIN',B,0.4);
    iCard(22,H*0.52,346,58,'◆','Lecture','QUÊTE · 15 MIN','#7c4dff',0.8);

    // Barre XP
    const xa=eOut(pct(33,34,f));
    if(xa>0){
      ctx.save();ctx.globalAlpha=xa;
      ctx.fillStyle='rgba(255,255,255,.03)';rr(22,H*0.68,346,52,12);ctx.fill();
      ctx.strokeStyle=hA(B,0.12);ctx.lineWidth=1;rr(22,H*0.68,346,52,12);ctx.stroke();
      ctx.fillStyle=hA(C,0.4);ctx.font='700 6px Orbitron,monospace';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText('PROGRESSION — RANG B',34,H*0.68+16);
      ctx.fillStyle='rgba(41,121,255,.1)';rr(34,H*0.68+28,322,4,2);ctx.fill();
      const fw=eOut(pct(33.5,35.5,f))*0.72*322;
      if(fw>0){
        const g2=ctx.createLinearGradient(34,0,34+fw,0);
        g2.addColorStop(0,B);g2.addColorStop(1,C);
        ctx.fillStyle=g2;rr(34,H*0.68+28,fw,4,2);ctx.fill();
      }
      ctx.restore();
    }
  }

  // ══════════════════════════════════════
  // SCÈNE 7 : 38–45s — "MAINTENANT C'EST TON TOUR"
  // ══════════════════════════════════════
  if(sec>=38 && sec<45){
    drawCut(pct(38,38.2,f));

    // Fond intense
    drawNebula(W/2,H/2,350,B,0.15);
    drawNebula(W/2,H/2,200,C,0.08);

    // "MAINTENANT"
    const a1=eOut(pct(38.4,39.8,f))*(1-eOut(pct(43.5,44.5,f)));
    if(a1>0){
      ctx.save();ctx.globalAlpha=a1*0.45;
      ctx.font='600 16px Rajdhani,sans-serif';ctx.fillStyle='#fff';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='7px';
      ctx.fillText('MAINTENANT',W/2,H/2-80);ctx.restore();
    }
    // "C'EST"
    const a2=eOut(pct(39.5,40.8,f))*(1-eOut(pct(43.5,44.5,f)));
    if(a2>0){
      ctx.save();ctx.globalAlpha=a2;
      ctx.font='900 54px Orbitron,monospace';ctx.fillStyle='#fff';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText("C'EST",W/2,H/2-10);ctx.restore();
    }
    // "TON TOUR" — gradient bleu
    const a3=eOut(pct(40.5,42,f))*(1-eOut(pct(43.5,44.5,f)));
    if(a3>0){
      ctx.save();ctx.globalAlpha=a3;
      const g=ctx.createLinearGradient(W/2-90,0,W/2+90,0);
      g.addColorStop(0,B);g.addColorStop(1,C);
      ctx.fillStyle=g;
      ctx.font='900 64px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('TON TOUR',W/2,H/2+72);ctx.restore();
    }
    // Ligne sous
    const la=eOut(pct(42,43,f))*(1-eOut(pct(43.5,44.5,f)));
    if(la>0){
      ctx.save();ctx.globalAlpha=la*0.3;
      ctx.strokeStyle=C;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(W*0.25,H/2+120);ctx.lineTo(W*0.75,H/2+120);ctx.stroke();
      ctx.restore();
    }
  }

  // ══════════════════════════════════════
  // SCÈNE 8 : 45–55s — FINAL
  // ══════════════════════════════════════
  if(sec>=45){
    drawCut(pct(45,45.2,f));

    const t=pct(45,55,f);
    drawNebula(W/2,H*0.4,350,B,0.12*eOut(t));
    drawNebula(W*0.3,H*0.6,200,C,0.07*eOut(t));

    // Logo hex grand
    const lA=eOut(pct(45.4,47,f));
    if(lA>0){
      const cx=W/2,cy=H*0.35,R=70;
      const rot=(f-ft(45))*0.005;
      ctx.save();ctx.globalAlpha=lA;
      ctx.translate(cx,cy);ctx.rotate(rot);
      ctx.strokeStyle=B;ctx.lineWidth=2.5;ctx.shadowBlur=16*lA;ctx.shadowColor=B;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i?ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R):ctx.moveTo(Math.cos(a)*R,Math.sin(a)*R);}
      ctx.closePath();ctx.stroke();
      ctx.strokeStyle=hA(C,0.3);ctx.lineWidth=1;ctx.setLineDash([4,5]);
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i?ctx.lineTo(Math.cos(a)*R*0.54,Math.sin(a)*R*0.54):ctx.moveTo(Math.cos(a)*R*0.54,Math.sin(a)*R*0.54);}
      ctx.closePath();ctx.stroke();ctx.setLineDash([]);
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3-Math.PI/6;
        ctx.shadowBlur=8;ctx.shadowColor=i%2?C:B;ctx.fillStyle=i%2?C:B;
        ctx.beginPath();ctx.arc(Math.cos(a)*R,Math.sin(a)*R,4,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='#fff';ctx.shadowBlur=14;ctx.shadowColor='#fff';
      ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // LEVELINK wordmark
    const wA=eOut(pct(46.5,48,f));
    if(wA>0){
      ctx.save();ctx.globalAlpha=wA;
      const g=ctx.createLinearGradient(W/2-100,0,W/2+100,0);
      g.addColorStop(0,'#fff');g.addColorStop(0.45,C);g.addColorStop(1,B);
      ctx.fillStyle=g;ctx.font='900 38px Orbitron,monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('LEVELINK',W/2,H*0.58);
      ctx.restore();
    }

    // Tagline
    const ta=eOut(pct(48,49.5,f));
    if(ta>0){
      ctx.save();ctx.globalAlpha=ta*0.4;
      ctx.font='600 11px Rajdhani,sans-serif';ctx.fillStyle='#fff';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='4px';
      ctx.fillText('Le jeu de ta vraie vie',W/2,H*0.66);ctx.restore();
    }

    // "LIEN EN BIO" clignotant
    const ba=eOut(pct(50,51.5,f));
    if(ba>0){
      const blink=Math.sin((f-ft(51))*0.12)>0?1:0.4;
      ctx.save();ctx.globalAlpha=ba*blink;
      ctx.shadowBlur=12;ctx.shadowColor=C;
      ctx.fillStyle=C;ctx.font='700 14px Orbitron,monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='3px';
      ctx.fillText('[ LIEN EN BIO ]',W/2,H*0.76);
      ctx.restore();
    }

    // "SUIS LE PROJET" sous
    const sa=eOut(pct(52,53,f));
    if(sa>0){
      ctx.save();ctx.globalAlpha=sa*0.3;
      ctx.font='600 9px Rajdhani,sans-serif';ctx.fillStyle='#fff';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='3px';
      ctx.fillText('SUIS LE PROJET — FAIS PARTIE DU DÉBUT',W/2,H*0.83);ctx.restore();
    }
  }

  // ── Letterbox ──
  drawLetterbox(eOut(pct(0.5,2,f)));

  // ── Progress bar ──
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(0,H-2,W,2);
  const g=ctx.createLinearGradient(0,0,W*f/TF,0);
  g.addColorStop(0,B);g.addColorStop(1,C);
  ctx.fillStyle=g;ctx.fillRect(0,H-2,W*f/TF,2);
}

// ── roundRect ──
function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Recording ──
let chunks=[],blob=null;

async function generate(){
  await document.fonts.ready;
  const stream=cv.captureStream(FPS);
  const rec=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:8000000});
  rec.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data)};
  rec.onstop=()=>{
    blob=new Blob(chunks,{type:'video/webm'});
    document.getElementById('status').textContent='✓ VIDÉO PRÊTE — 55 SECONDES';
    document.getElementById('dl').style.display='block';
  };
  rec.start(100);
  for(let f=0;f<=TF;f++){
    renderFrame(f);
    document.getElementById('bar').style.width=(f/TF*100).toFixed(1)+'%';
    document.getElementById('status').textContent=`${(f/FPS).toFixed(1)}s / ${DUR}s`;
    if(f%3===0)await new Promise(r=>setTimeout(r,0));
  }
  rec.stop();
}

function dl(){
  if(!blob)return;
  const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download='levelink-cinema.webm';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);
}

window.addEventListener('load',()=>setTimeout(generate,600));
</script>
