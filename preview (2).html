<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Levelink Panel Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#020814;
      --bg2:#06152b;
      --blue:#57b8ff;
      --blue2:#2b7cff;
      --line:rgba(99, 183, 255, .7);
      --text:#eef7ff;
      --gold:#ffd45c;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(43,124,255,.18), transparent 35%),
        radial-gradient(circle at bottom, rgba(87,184,255,.08), transparent 35%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      font-family:"Rajdhani", sans-serif;
      color:var(--text);
    }

    .stars,.stars::before,.stars::after{
      position:absolute;inset:0;content:"";
      background-image:radial-gradient(circle, rgba(255,255,255,.9) 1px, transparent 1.2px);
      background-size:120px 120px;
      opacity:.16;
      pointer-events:none;
    }
    .stars::before{background-size:180px 180px;opacity:.08;animation:drift 18s linear infinite}
    .stars::after{background-size:90px 90px;opacity:.06;animation:drift 28s linear infinite reverse}

    @keyframes drift{
      from{transform:translateY(0)}
      to{transform:translateY(30px)}
    }

    .wrap{
      position:relative;
      width:min(92vw, 520px);
      aspect-ratio:9/16;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .panel{
      position:relative;
      width:100%;
      max-width:420px;
      min-height:310px;
      padding:24px 22px 26px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(7,22,46,.82), rgba(4,12,28,.9));
      border:1px solid rgba(87,184,255,.28);
      box-shadow:
        0 0 0 1px rgba(87,184,255,.08) inset,
        0 0 30px rgba(43,124,255,.18),
        0 0 70px rgba(43,124,255,.08);
      overflow:hidden;
      animation:panelIn .8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes panelIn{
      0%{opacity:0;transform:translateY(18px) scale(.96)}
      100%{opacity:1;transform:none}
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:10px;
      border:1px solid rgba(87,184,255,.2);
      border-radius:18px;
      pointer-events:none;
    }

    .panel::after{
      content:"";
      position:absolute;
      left:18px;right:18px;top:0;height:2px;
      background:linear-gradient(90deg, transparent, var(--blue), transparent);
      border-radius:999px;
      box-shadow:0 0 14px rgba(87,184,255,.7);
      animation:scan 3s ease-in-out infinite;
    }

    @keyframes scan{
      0%,100%{opacity:.2;transform:scaleX(.35)}
      50%{opacity:1;transform:scaleX(1)}
    }

    .hud-top{
      display:flex;
      gap:12px;
      margin-bottom:24px;
      align-items:center;
      justify-content:center;
    }

    .icon-box,.info-box{
      border:1px solid rgba(87,184,255,.42);
      background:rgba(87,184,255,.05);
      box-shadow:0 0 15px rgba(87,184,255,.08);
      color:var(--text);
    }

    .icon-box{
      width:58px;height:48px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-family:"Orbitron", sans-serif;
      font-size:24px;font-weight:700;
    }

    .info-box{
      min-width:120px;height:48px;padding:0 20px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-family:"Orbitron", sans-serif;
      font-size:24px;font-weight:700;letter-spacing:1px;
    }

    .content{
      text-align:center;
      min-height:160px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:16px;
      padding:8px 6px;
    }

    .tag{
      font-family:"Orbitron", sans-serif;
      font-size:18px;
      letter-spacing:1px;
      color:#d8ecff;
      opacity:.95;
    }

    .line{
      font-family:"Orbitron", sans-serif;
      font-size:21px;
      line-height:1.35;
      letter-spacing:.5px;
      opacity:0;
      transform:translateY(12px);
      animation:textIn .55s ease forwards;
    }

    @keyframes textIn{
      to{opacity:1;transform:none}
    }

    .accent{
      color:var(--gold);
      text-shadow:0 0 10px rgba(255,212,92,.25);
    }

    .strong{
      color:#ffffff;
      font-weight:800;
    }

    .buttons{
      margin-top:18px;
      display:flex;
      gap:14px;
      justify-content:center;
    }

    .btn{
      min-width:132px;
      height:52px;
      border-radius:12px;
      border:1px solid rgba(87,184,255,.4);
      background:linear-gradient(180deg, rgba(87,184,255,.1), rgba(87,184,255,.04));
      color:var(--text);
      font-family:"Orbitron", sans-serif;
      font-size:20px;
      cursor:pointer;
      transition:.22s ease;
      box-shadow:0 0 14px rgba(87,184,255,.08);
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 0 20px rgba(87,184,255,.18);
      border-color:rgba(87,184,255,.7);
    }

    .btn:active{transform:scale(.96)}

    .dots{
      position:absolute;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:8px;
    }

    .dot{
      width:7px;height:7px;border-radius:999px;
      background:rgba(255,255,255,.25);
      transition:.25s ease;
    }

    .dot.active{
      width:24px;
      background:linear-gradient(90deg, var(--blue2), var(--blue));
      box-shadow:0 0 12px rgba(87,184,255,.45);
    }

    .flash{
      position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(circle at center, rgba(87,184,255,.15), transparent 50%);
      opacity:.35;
      animation:pulse 2.6s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:.16}
      50%{opacity:.34}
    }

    @media (max-width:520px){
      .panel{min-height:290px;padding:20px 16px 24px}
      .line{font-size:18px}
      .tag{font-size:15px}
      .btn{min-width:118px;font-size:17px;height:48px}
      .icon-box{width:52px;height:44px;font-size:22px}
      .info-box{height:44px;font-size:20px}
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="wrap">
    <div class="panel">
      <div class="flash"></div>

      <div class="hud-top">
        <div class="icon-box">i</div>
        <div class="info-box">INFO</div>
      </div>

      <div class="content" id="content"></div>

      <div class="buttons">
        <button class="btn" id="leftBtn">VOIR</button>
        <button class="btn" id="rightBtn">IGNORER</button>
      </div>

      <div class="dots" id="dots"></div>
    </div>
  </div>

  <script>
    const slides = [
      {
        lines: [
          '[LEVELINK SYSTEM]',
          '[TU MANQUES PAS DE MOTIVATION]',
          '[TU MANQUES DE <span class="accent">SYSTÈME</span>]'
        ],
        left: 'VOIR',
        right: 'IGNORER'
      },
      {
        lines: [
          '[LEVELINK SYSTEM]',
          '[LES JEUX TE FONT PROGRESSER]',
          '[<span class="strong">NIVEAUX</span> • <span class="accent">XP</span> • <span class="strong">OBJECTIFS</span>]'
        ],
        left: 'CONTINUER',
        right: 'REFUSER'
      },
      {
        lines: [
          '[LEVELINK SYSTEM]',
          '[ALORS POURQUOI PAS TA VIE ?]',
          '[TRANSFORME TA RÉALITÉ EN JEU]'
        ],
        left: 'ACTIVER',
        right: 'ANNULER'
      },
      {
        lines: [
          '[LEVELINK SYSTEM]',
          '[ON EST EN TRAIN DE CRÉER ÇA]',
          '[PROJET EN COURS]'
        ],
        left: 'VOIR',
        right: 'FERMER'
      },
      {
        lines: [
          '[LEVELINK QUEST]',
          '[TU PEUX FAIRE PARTIE DU DÉBUT]',
          '[SOUTENIR LE PROJET]'
        ],
        left: 'REJOINDRE',
        right: 'PASSER'
      }
    ];

    const content = document.getElementById('content');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const dots = document.getElementById('dots');

    let index = 0;
    let interval;

    function createDots() {
      dots.innerHTML = slides.map((_, i) =>
        `<div class="dot ${i === 0 ? 'active' : ''}"></div>`
      ).join('');
    }

    function renderSlide(i) {
      const slide = slides[i];

      content.innerHTML = slide.lines.map((line, idx) => {
        const cls = idx === 0 ? 'tag line' : 'line';
        return `<div class="${cls}" style="animation-delay:${idx * 0.12}s">${line}</div>`;
      }).join('');

      leftBtn.textContent = slide.left;
      rightBtn.textContent = slide.right;

      [...dots.children].forEach((dot, d) => {
        dot.classList.toggle('active', d === i);
      });
    }

    function nextSlide() {
      index = (index + 1) % slides.length;
      renderSlide(index);
    }

    leftBtn.addEventListener('click', () => restartAndNext());
    rightBtn.addEventListener('click', () => restartAndNext());

    function restartAndNext() {
      nextSlide();
      clearInterval(interval);
      interval = setInterval(nextSlide, 3200);
    }

    createDots();
    renderSlide(index);
    interval = setInterval(nextSlide, 3200);
  </script>
</body>
</html>
