<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Levelink TikTok Carousel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#010611;
      --bg2:#07182f;
      --blue:#60bbff;
      --blue2:#2d7dff;
      --text:#eef7ff;
      --muted:#a8cfff;
      --gold:#ffd65a;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    body{
      font-family:"Rajdhani",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 15%, rgba(45,125,255,.22), transparent 26%),
        radial-gradient(circle at 50% 85%, rgba(96,187,255,.10), transparent 22%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
    }

    .bg,
    .bg::before,
    .bg::after{
      position:fixed;inset:0;pointer-events:none;content:"";
    }

    .bg::before{
      background-image:
        radial-gradient(circle, rgba(255,255,255,.85) 1px, transparent 1.3px);
      background-size:140px 140px;
      opacity:.14;
      animation:drift1 20s linear infinite;
    }

    .bg::after{
      background-image:
        radial-gradient(circle, rgba(120,190,255,.65) 1px, transparent 1.3px);
      background-size:95px 95px;
      opacity:.07;
      animation:drift2 32s linear infinite reverse;
    }

    @keyframes drift1{
      from{transform:translateY(0)}
      to{transform:translateY(36px)}
    }
    @keyframes drift2{
      from{transform:translateY(0)}
      to{transform:translateY(-42px)}
    }

    .frame{
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      position:relative;
    }

    .carousel{
      width:min(100%, 430px);
      height:min(92vh, 860px);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .panel{
      width:100%;
      max-width:390px;
      min-height:290px;
      border-radius:26px;
      position:relative;
      padding:22px 18px 26px;
      background:linear-gradient(180deg, rgba(8,24,50,.78), rgba(5,14,31,.90));
      border:1px solid rgba(96,187,255,.28);
      box-shadow:
        0 0 0 1px rgba(96,187,255,.06) inset,
        0 0 28px rgba(45,125,255,.18),
        0 0 60px rgba(45,125,255,.08);
      overflow:hidden;
      backdrop-filter:blur(8px);
      animation:panelIn .7s cubic-bezier(.16,1,.3,1);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:10px;
      border:1px solid rgba(96,187,255,.18);
      border-radius:18px;
      pointer-events:none;
    }

    .panel::after{
      content:"";
      position:absolute;
      left:18px;right:18px;bottom:0;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--blue), transparent);
      box-shadow:0 0 12px rgba(96,187,255,.55);
      animation:scan 3s ease-in-out infinite;
    }

    @keyframes panelIn{
      0%{opacity:0;transform:translateY(18px) scale(.96)}
      100%{opacity:1;transform:none}
    }
    @keyframes scan{
      0%,100%{opacity:.28;transform:scaleX(.35)}
      50%{opacity:1;transform:scaleX(1)}
    }

    .flash{
      position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(circle at 50% 50%, rgba(96,187,255,.12), transparent 55%);
      animation:pulse 2.8s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:.15}
      50%{opacity:.32}
    }

    .top{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:20px;
      position:relative;
      z-index:2;
    }

    .mini,
    .title-box{
      height:46px;
      border:1px solid rgba(96,187,255,.42);
      background:rgba(96,187,255,.05);
      box-shadow:0 0 14px rgba(96,187,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      font-family:"Orbitron",sans-serif;
      color:var(--text);
    }

    .mini{
      width:52px;
      font-size:22px;
      font-weight:700;
    }

    .title-box{
      min-width:126px;
      padding:0 18px;
      font-size:22px;
      font-weight:700;
      letter-spacing:1px;
    }

    .content{
      min-height:150px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      gap:14px;
      padding:8px 10px;
      position:relative;
      z-index:2;
    }

    .line{
      font-family:"Orbitron",sans-serif;
      line-height:1.35;
      letter-spacing:.4px;
      opacity:0;
      transform:translateY(10px);
      animation:textIn .5s ease forwards;
      max-width:300px;
    }

    .line.small{
      font-size:17px;
      color:#dcedff;
    }

    .line.main{
      font-size:22px;
      color:#ffffff;
    }

    .line.sub{
      font-size:18px;
      color:var(--muted);
    }

    @keyframes textIn{
      to{opacity:1;transform:none}
    }

    .accent{
      color:var(--gold);
      text-shadow:0 0 10px rgba(255,214,90,.18);
    }

    .strong{
      color:#fff;
      font-weight:800;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:16px;
      position:relative;
      z-index:2;
      flex-wrap:wrap;
    }

    .btn{
      min-width:132px;
      height:50px;
      border-radius:12px;
      border:1px solid rgba(96,187,255,.42);
      background:linear-gradient(180deg, rgba(96,187,255,.10), rgba(96,187,255,.04));
      color:var(--text);
      font-family:"Orbitron",sans-serif;
      font-size:18px;
      cursor:pointer;
      transition:.22s ease;
      box-shadow:0 0 14px rgba(96,187,255,.08);
    }

    .btn:hover{
      transform:translateY(-2px);
      border-color:rgba(96,187,255,.72);
      box-shadow:0 0 18px rgba(96,187,255,.18);
    }

    .btn:active{transform:scale(.97)}

    .dots{
      position:absolute;
      left:50%;
      bottom:26px;
      transform:translateX(-50%);
      display:flex;
      gap:8px;
      z-index:3;
    }

    .dot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:rgba(255,255,255,.25);
      transition:.25s ease;
    }

    .dot.active{
      width:24px;
      background:linear-gradient(90deg,var(--blue2),var(--blue));
      box-shadow:0 0 12px rgba(96,187,255,.5);
    }

    .counter{
      position:absolute;
      top:18px;
      right:18px;
      z-index:3;
      font-family:"Orbitron",sans-serif;
      font-size:11px;
      color:rgba(255,255,255,.72);
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      padding:7px 10px;
      border-radius:999px;
      letter-spacing:1px;
    }

    .swipe-zone{
      position:absolute;inset:0;z-index:4;
    }

    @media (max-width: 460px){
      .carousel{height:100vh}
      .panel{max-width:100%;min-height:270px;padding:20px 14px 24px}
      .line.main{font-size:19px}
      .line.sub,.line.small{font-size:16px}
      .title-box{font-size:20px;min-width:114px}
      .mini{width:48px;font-size:20px}
      .btn{min-width:118px;height:46px;font-size:16px}
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="frame">
    <div class="carousel" id="carousel">
      <div class="panel" id="panel">
        <div class="flash"></div>
        <div class="counter" id="counter">1 / 5</div>

        <div class="top">
          <div class="mini">i</div>
          <div class="title-box">INFO</div>
        </div>

        <div class="content" id="content"></div>

        <div class="actions">
          <button class="btn" id="leftBtn">VOIR</button>
          <button class="btn" id="rightBtn">IGNORER</button>
        </div>

        <div class="dots" id="dots"></div>
      </div>

      <div class="swipe-zone" id="swipeZone"></div>
    </div>
  </div>

  <script>
    const slides = [
      {
        lines: [
          { cls: 'small', text: '[LEVELINK SYSTEM]' },
          { cls: 'main', text: '[TU MANQUES PAS DE MOTIVATION]' },
          { cls: 'sub', text: '[TU MANQUES DE <span class="accent">SYSTÈME</span>]' }
        ],
        left: 'VOIR',
        right: 'IGNORER'
      },
      {
        lines: [
          { cls: 'small', text: '[LEVELINK SYSTEM]' },
          { cls: 'main', text: '[LES JEUX TE FONT PROGRESSER]' },
          { cls: 'sub', text: '[<span class="strong">NIVEAUX</span> • <span class="accent">XP</span> • <span class="strong">OBJECTIFS</span>]' }
        ],
        left: 'CONTINUER',
        right: 'REFUSER'
      },
      {
        lines: [
          { cls: 'small', text: '[LEVELINK SYSTEM]' },
          { cls: 'main', text: '[ALORS POURQUOI PAS TA VIE ?]' },
          { cls: 'sub', text: '[TRANSFORME TA RÉALITÉ EN JEU]' }
        ],
        left: 'ACTIVER',
        right: 'ANNULER'
      },
      {
        lines: [
          { cls: 'small', text: '[LEVELINK SYSTEM]' },
          { cls: 'main', text: '[ON EST EN TRAIN DE CRÉER ÇA]' },
          { cls: 'sub', text: '[PROJET EN COURS]' }
        ],
        left: 'VOIR',
        right: 'FERMER'
      },
      {
        lines: [
          { cls: 'small', text: '[LEVELINK QUEST]' },
          { cls: 'main', text: '[TU PEUX FAIRE PARTIE DU DÉBUT]' },
          { cls: 'sub', text: '[<span class="accent">SOUTENIR LE PROJET</span>]' }
        ],
        left: 'REJOINDRE',
        right: 'PASSER'
      }
    ];

    const content = document.getElementById('content');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const dots = document.getElementById('dots');
    const counter = document.getElementById('counter');
    const swipeZone = document.getElementById('swipeZone');
    const panel = document.getElementById('panel');

    let index = 0;
    let auto;
    let startX = 0;
    let startY = 0;

    function initDots(){
      dots.innerHTML = slides.map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join('');
    }

    function renderSlide(i, dir = 1){
      const slide = slides[i];

      panel.animate(
        [
          { opacity: .75, transform: `translateX(${dir > 0 ? 18 : -18}px) scale(.985)` },
          { opacity: 1, transform: 'translateX(0) scale(1)' }
        ],
        { duration: 280, easing: 'cubic-bezier(.16,1,.3,1)' }
      );

      content.innerHTML = slide.lines.map((line, idx) =>
        `<div class="line ${line.cls}" style="animation-delay:${idx * 0.12}s">${line.text}</div>`
      ).join('');

      leftBtn.textContent = slide.left;
      rightBtn.textContent = slide.right;
      counter.textContent = `${i + 1} / ${slides.length}`;

      [...dots.children].forEach((dot, d) => {
        dot.classList.toggle('active', d === i);
      });
    }

    function nextSlide(){
      index = (index + 1) % slides.length;
      renderSlide(index, 1);
    }

    function prevSlide(){
      index = (index - 1 + slides.length) % slides.length;
      renderSlide(index, -1);
    }

    function restartAuto(){
      clearInterval(auto);
      auto = setInterval(nextSlide, 3200);
    }

    leftBtn.addEventListener('click', () => {
      nextSlide();
      restartAuto();
    });

    rightBtn.addEventListener('click', () => {
      nextSlide();
      restartAuto();
    });

    swipeZone.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
    }, { passive: true });

    swipeZone.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;

      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) nextSlide();
        else prevSlide();
        restartAuto();
      }
    }, { passive: true });

    initDots();
    renderSlide(index);
    auto = setInterval(nextSlide, 3200);
  </script>
</body>
</html>
